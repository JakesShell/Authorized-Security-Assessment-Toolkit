<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentinelScope Classroom Beacon</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <main class="student-shell">
        <section class="student-card">
            <p class="eyebrow">ICT Classroom Beacon</p>
            <h1>I See You</h1>
            <p class="subtitle">
                This page lets you safely join the teacher's network demo. It does not read your files,
                photos, messages, passwords, or private data.
            </p>

            <form id="studentForm" class="student-form">
                <input id="studentName" placeholder="Your name" required />

                <select id="deviceType">
                    <option value="Phone">Phone</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Tablet">Tablet</option>
                    <option value="Other">Other device</option>
                </select>

                <label class="check-row">
                    <input id="screenLock" type="checkbox" />
                    <span>My device has a PIN, password, fingerprint, or face unlock.</span>
                </label>

                <button type="submit" class="primary-btn">Join Demo</button>
                <button type="button" id="notifyBtn" class="secondary-btn">Allow Optional Notification</button>
            </form>

            <div id="studentResult" class="student-result hidden"></div>
        </section>
    </main>

    <script>
        const form = document.getElementById("studentForm");
        const resultBox = document.getElementById("studentResult");
        const notifyBtn = document.getElementById("notifyBtn");

        notifyBtn.addEventListener("click", async () => {
            if (!("Notification" in window)) {
                resultBox.classList.remove("hidden");
                resultBox.innerHTML = "<strong>Notifications are not supported on this browser.</strong>";
                return;
            }

            const permission = await Notification.requestPermission();
            resultBox.classList.remove("hidden");
            resultBox.innerHTML = `<strong>Notification permission: ${permission}</strong>`;
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                name: document.getElementById("studentName").value,
                device_type: document.getElementById("deviceType").value,
                has_screen_lock: document.getElementById("screenLock").checked,
            };

            const response = await fetch("/api/classroom/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
            });

            const data = await response.json();

            resultBox.classList.remove("hidden");
            resultBox.innerHTML = `
                <span class="big-eye">👀</span>
                <h2>${data.message}</h2>
                <p>Your device joined the classroom demo safely.</p>
                <p><strong>Screen lock:</strong> ${data.has_screen_lock ? "Yes, protected" : "Not confirmed"}</p>
            `;

            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("SentinelScope Classroom Beacon", {
                    body: data.message,
                });
            }
        });
    </script>
</body>
</html>
